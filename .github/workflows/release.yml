name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-tag:
    name: Create Tag
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from package.json
        id: version
        run: |
          version=$(grep -oP '"version":\s*"\K\d+\.\d+\.\d+' package.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v${{ steps.version.outputs.version }}" \
            --repo "${{ github.repository }}" --yes || true

      - name: Delete existing tag
        run: |
          git push origin --delete "v${{ steps.version.outputs.version }}" || true

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

  build:
    name: Build (${{ matrix.target }})
    needs: create-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            suffix: linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            suffix: linux-arm64
          - target: bun-darwin-arm64
            os: macos-latest
            suffix: darwin-arm64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build single binary
        run: |
          bun build src/main.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile chisiki-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chisiki-${{ matrix.suffix }}
          path: chisiki-${{ matrix.suffix }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [create-tag, build]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.create-tag.outputs.version }}" \
            artifacts/chisiki-linux-x64 \
            artifacts/chisiki-linux-arm64 \
            artifacts/chisiki-darwin-arm64 \
            --repo "${{ github.repository }}" \
            --title "v${{ needs.create-tag.outputs.version }}" \
            --generate-notes
